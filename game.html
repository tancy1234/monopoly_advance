<!DOCTYPE html>
<html>
<head>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script src="firebase.js"></script>
  <script src="function2.js"></script>

  <meta charset="UTF-8">
  <title>Game Control</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#111; color:white; }
    .card { background:#222; padding:10px; margin:10px 0; border-radius:8px; }
    button { padding:10px; margin-top:10px; }
    select, input { padding:5px; margin:5px; }
  </style>
</head>

<body>

<h2>🎮 玩家终端</h2>

<div id="players"></div>

<hr>
<br> 
<h3 id="me"></h3>
<br>
<div id="ability"></div>
<br>
<hr>

<h3>💸 转钱咯</h3>


<select id="to"></select>

<input id="amount" placeholder="Amount">

<button onclick="transfer()">转给玩家</button>
<button onclick="pay()">转给银行</button>
<script>

let players = {};
let currentTurn = "";

// 读取自己是谁
function getMyCharacter(){

    return localStorage.getItem("myCharacter");

}
// 监听玩家资料
db.ref("players").on("value",(snap)=>{

    players = snap.val() || {};

    renderPlayers();
    renderSelect();
    
});
// 监听回合
db.ref("currentTurn").on("value",(snap)=>{

    currentTurn = snap.val();

    checkMyTurn();

});

function pay(){

    let me = getMyCharacter();

    let amount =
    parseInt(document.getElementById("amount").value);


    if(!amount || amount<=0){
        alert("Invalid amount");
        return;
    }


    if(players[me].gold < amount){

        alert("Not enough money");
        return;

    }


    players[me].gold -= amount;


    db.ref("players").set(players);


    alert(
      "Paid 💰 " + amount
    );

}
// 检查是不是自己
function checkMyTurn(){

    let me = getMyCharacter();


    if(!me){
        return;
    }
    if(currentTurn === me){

        // 自己的回合
        document.body.style.background = "#90ee90";
        document.body.style.color = "black";


        showTurnMessage(true);


    }else{
     // 别人的回合
        document.body.style.background = "#111";
        document.body.style.color = "white";


        showTurnMessage(false);

    }

}

function showTurnMessage(myTurn){

    let old = document.getElementById("turnAlert");


    if(!old){

        let div=document.createElement("h2");
        div.id="turnAlert";

        document.body.insertBefore(
            div,
            document.body.firstChild
        );

    }
    let box=document.getElementById("turnAlert");


    if(myTurn){

        box.innerHTML="🟢 快点! 到你了！！！";

    }else{

        box.innerHTML=
        "⏳ 等一下 现在是 "
        + currentTurn;

    }

}

listenPlayers((data)=>{

    players = data;

    renderPlayers();
    renderSelect();

});

function renderPlayers() {

  let html = "";

  Object.keys(players).forEach(char => {
    html += `
      <div>
        ${char.toUpperCase()}
        →
        ${players[char]?.name || "No Name"}
        💰
        ${players[char]?.gold || 0}
      </div>
    `;
  });

  document.getElementById("players").innerHTML = html;
}

function renderSelect() {

  let to=document.getElementById("to");

  to.innerHTML="";


  let me = getMyCharacter();


  Object.keys(players).forEach(char=>{


      // 不显示自己
      if(char === me){
          return;
      }


      to.innerHTML+=`
      <option value="${char}">
      ${char} (${players[char].name})
      </option>`;

  });

}

function transfer() {


  let fromChar = getMyCharacter();

  let toChar = document.getElementById("to").value;

  let amount = parseInt(
      document.getElementById("amount").value
  );


  if(!fromChar){

      alert("No character");
      return;

  }


  if(!amount || amount <= 0){

      alert("Invalid amount");
      return;

  }



  if(!players[fromChar] || !players[toChar]){

      alert("Invalid player");
      return;

  }



  // 检查自己的钱
  if(players[fromChar].gold < amount){

      alert("不够钱咯");
      return;

  }



  // 扣自己
  players[fromChar].gold -= amount;


  // 给别人
  players[toChar].gold += amount;



  db.ref("players").set(players);



  alert(
    fromChar.toUpperCase()
    + " 给 "
    + toChar.toUpperCase()
    + " 💰 "
    + amount
  );


}

function showAbility(){

    let me = localStorage.getItem("myCharacter");

    if(!players[me]){
        return;
    }


    let abilities = {

        zeus:{
            name:"⚡ 制霸闪电",
            description:
            "经过起点刷新一次<br>与玩家战斗直接胜利，不获得金币"
        },

        hera:{
            name:"💗 爱神捆绑",
            description:
            "经过起点 技能点+1（最多3）<br>支付3技能点发动技能，选择两名玩家绑定，下一次共享负面效果"
        },

        mary:{
            name:"✨ 天主救恩",
            description:
            "无效战斗，双方从银行获得600金币"
        },

        poisedon:{
            name:"🌊 海王的规则",
            description:
            "控制路线排列"
        },

        hades:{
            name:"💀 冥王波动",
            description:
            "经过起点刷新使用<br>被施加负面技能时，可无效该技能并施加给使用者"
        },

        medusa:{
            name:"🐍 石化",
            description:
            "每次经过起点刷新使用<br>选择一名玩家停留一回合"
        },

        apollo:{
            name:"☀️ 太阳神之箭",
            description:
            "支付600金币使用总和骰子"
        },

        knight:{
            name:"🔥 偷窃",
            description:
            "每次经过起点刷新使用<br>支付2000金币，得到一名角色的技能，使用后即消失"
        },

        esther:{
            name:"⭐ 明亮之星",
            description:
            "起手特殊能力"
        },

        abraham:{
            name:"🐑 献祭羔羊",
            description:
            "消耗羔羊抵消惩罚"
        },

        maxhine:{
            name:"🤖 无灵魂",
            description:
            "免疫角色技能"
        },

        deborah:{
            name:"📜 先知判断",
            description:
            "调整技能卡"
        },

        moses:{
            name:"⚖️ 十大诫律",
            description:
            "禁止角色使用技能"
        },

        armor:{
            name:"🛡️ 改装",
            description:
            "随机获得骑士装备"
        }

    };


    let skill = abilities[me];


    if(!skill){

        skill={

            name:"无技能",

            description:""

        };

    }
    let abilityData = players[me].ability;
    let status = "";

    if(abilityData.cooldown > 0){

        status =
        `
        🔴 Cooldown:
        ${abilityData.cooldown}
        回合
        `;

    }else{

        status=
        `
        🟢 READY
        `;
    }



    document.getElementById("ability").innerHTML=

    `
    <hr>
    <h3>✨ 你的技能</h3>
    <div class="card">

        <h3>
        ${skill.name}
        </h3>


        <p>
        ${skill.description}
        </p>
        <hr>
        🔋 Charge:

        ${abilityData.charge}
        /
        ${abilityData.maxCharge}
        <br><br>
        ${status}
        <br><br>
        <button

        onclick="useAbility()"

        ${
            abilityData.charge<=0 ||
            abilityData.cooldown>0
            ?
            "disabled"
            :
            ""
        }
        >
        ⚡ 使用技能
        </button>
    </div>
    `;
}

function useAbility(){

    let me = getMyCharacter();


    if(!players[me]){
        return;
    }


    let ability = players[me].ability;



    if(me=="hera"){

        if(ability.charge<3){

            alert("需要3颗技能点才能发动");

            return;
        }

    }else{

        if(ability.charge<=0){

            alert("没有技能次数");

            return;
        }

    }

    if(ability.cooldown>0){
        alert("技能冷却中");
        return;
    }

    switch(me){

        case "zeus":
            if(ability.charge <= 0){

                alert("没有神雷");

                return;

            }
            if(ability.charge>0){
                ability.charge--;
            }
            ability.active=true;
            ability.status="lightning_ready";
            alert(
            "⚡ 宙斯发动 制霸闪电！\n下一次战斗直接胜利"
            );


        break;

        case "hades":

            ability.charge--;

            ability.active=true;

            ability.status="hades_ready";


            alert(
            "💀 哈迪斯发动冥王波动！\n负面技能将被反弹"
            );


        break;

        case "hera":

            if(ability.charge < 3){

                alert("需要3颗技能点才能发动");

                return;

            }

            ability.charge = 0;

            alert(
            "爱神捆绑发动！\n请通知Admin选择的两位玩家进行绑定。"
            );

        break;

        case "medusa":

            ability.charge--;

            ability.active=true;

            ability.status="medusa_ready";


            alert(
            "🐍 美杜莎发动石化！\n请通知Admin选择一名玩家停留一回合"
            );


        break;

        case "knight":

            if(players[me].gold < 2000){
                alert("金币不足，需要2000金币");
                return;
            }

            players[me].gold -= 2000;

            ability.charge--;
            ability.active=true;
            ability.status="steal_ready";


            alert(
            "🏍️ 恶灵骑士发动偷窃！\n"
            +"支付2000金币\n"
            +"请通知Admin选择复制的角色技能"
            );
        break;
        default:


            alert(
            "该角色技能还未制作"
            );
    }

    

    // 开始冷却
    if(ability.maxCooldown){

        ability.cooldown=ability.maxCooldown;

    }else{

        ability.cooldown=0;

    }

    db.ref("players/"+me).update({

        gold:players[me].gold,

        ability:ability

    });

    showAbility();
}

function showMe() {

  let me = localStorage.getItem("myCharacter");

  let characterName = {
    zeus: "宙斯",
    hera: "赫拉",
    hades: "哈迪斯",
    mary: "玛丽",
    poisedon:"波塞东",
    medusa:"美杜莎",
    apollo:"阿波罗",
    knight: "恶灵骑士",
    esther: "以斯帖",
    abraham:"亚伯拉罕",
    maxhine:"极限机甲",
    deborah:"底波拉",
    moses:"摩西",
    armor:"铠装之骑",
  };

  let displayName = characterName[me] || me;

  document.getElementById("me").innerText =
    "你的角色是: " + me.toUpperCase() + " (" + displayName + ")";

  showAbility()

}
setInterval(showMe,1000);

</script>

</body>
</html>
