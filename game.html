<!DOCTYPE html>
<html>
<head>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script src="firebase.js"></script>
  <script src="function2.js"></script>

  <meta charset="UTF-8">
  <title>Game Control</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#111; color:white; }
    .card { background:#222; padding:10px; margin:10px 0; border-radius:8px; }
    button { padding:10px; margin-top:10px; }
    select, input { padding:5px; margin:5px; }
  </style>
</head>

<body>

<h2>🎮 玩家终端</h2>

<div id="players"></div>

<hr>
<br> 
<h3 id="me"></h3>
<br>
<div id="ability"></div>
<br>
<hr>

<h3>💸 转钱咯</h3>


<select id="to"></select>

<input id="amount" placeholder="Amount">

<button onclick="transfer()">转给玩家</button>
<button onclick="pay()">转给银行</button>
<script>

let players = {};
let currentTurn = "";

// 读取自己是谁
function getMyCharacter(){

    return localStorage.getItem("myCharacter");

}
// 监听玩家资料
db.ref("players").on("value",(snap)=>{

    players = snap.val() || {};

    renderPlayers();
    renderSelect();

});
// 监听回合
db.ref("currentTurn").on("value",(snap)=>{

    currentTurn = snap.val();

    checkMyTurn();

});

function pay(){

    let me = getMyCharacter();

    let amount =
    parseInt(document.getElementById("amount").value);


    if(!amount || amount<=0){
        alert("Invalid amount");
        return;
    }


    if(players[me].gold < amount){

        alert("Not enough money");
        return;

    }


    players[me].gold -= amount;


    db.ref("players").set(players);


    alert(
      "Paid 💰 " + amount
    );

}
// 检查是不是自己
function checkMyTurn(){

    let me = getMyCharacter();


    if(!me){
        return;
    }
    if(currentTurn === me){

        // 自己的回合
        document.body.style.background = "#90ee90";
        document.body.style.color = "black";


        showTurnMessage(true);


    }else{
     // 别人的回合
        document.body.style.background = "#111";
        document.body.style.color = "white";


        showTurnMessage(false);

    }

}

function showTurnMessage(myTurn){

    let old = document.getElementById("turnAlert");


    if(!old){

        let div=document.createElement("h2");
        div.id="turnAlert";

        document.body.insertBefore(
            div,
            document.body.firstChild
        );

    }
    let box=document.getElementById("turnAlert");


    if(myTurn){

        box.innerHTML="🟢 快点! 到你了！！！";

    }else{

        box.innerHTML=
        "⏳ 等一下 现在是 "
        + currentTurn;

    }

}

listenPlayers((data)=>{

    players = data;

    renderPlayers();
    renderSelect();

});

function renderPlayers() {

  let html = "";

  Object.keys(players).forEach(char => {
    html += `
      <div>
        ${char.toUpperCase()}
        →
        ${players[char]?.name || "No Name"}
        💰
        ${players[char]?.gold || 0}
      </div>
    `;
  });

  document.getElementById("players").innerHTML = html;
}

function renderSelect() {

  let to=document.getElementById("to");

  to.innerHTML="";


  let me = getMyCharacter();


  Object.keys(players).forEach(char=>{


      // 不显示自己
      if(char === me){
          return;
      }


      to.innerHTML+=`
      <option value="${char}">
      ${char} (${players[char].name})
      </option>`;

  });

}

function transfer() {


  let fromChar = getMyCharacter();

  let toChar = document.getElementById("to").value;

  let amount = parseInt(
      document.getElementById("amount").value
  );


  if(!fromChar){

      alert("No character");
      return;

  }


  if(!amount || amount <= 0){

      alert("Invalid amount");
      return;

  }



  if(!players[fromChar] || !players[toChar]){

      alert("Invalid player");
      return;

  }



  // 检查自己的钱
  if(players[fromChar].gold < amount){

      alert("不够钱咯");
      return;

  }



  // 扣自己
  players[fromChar].gold -= amount;


  // 给别人
  players[toChar].gold += amount;



  db.ref("players").set(players);



  alert(
    fromChar.toUpperCase()
    + " 给 "
    + toChar.toUpperCase()
    + " 💰 "
    + amount
  );


}

function showAbility(){

    let me = localStorage.getItem("myCharacter");
    let abilities = {

        zeus: "制霸闪电 <br> 经过起点时刷新使用，与任意玩家对战时一次我方直接获得胜利， 不从对方获得金币",

        hera: "爱神捆绑 <br> 经过起点时，选择两名玩家作为对象， 那两个玩家其中一名玩家被罚款 坐牢或被施加负面技能时， 该效果将两名玩家同时承受",

        mary: "天主救恩 <br>该角色无效战斗， 双方从银行获得600金币",

        poisedon: "海王的规则<br>每次进过红海时可选择将埃及路线前面3张依照自己喜欢的顺序排列",

        hades: "冥王波动<br>每次经过起点刷新使用， 该角色被施加负面技能时（技能卡或角色技能）， 可无效改使用， 并施加于使用者身上",

        medusa: "石化<br>每次经过起点刷新使用， 选择一名玩家停留一回合",

        apollo: "太阳神之箭<br>该角色战斗时， 可支付600金币， 使用总和骰子",

        knight: "偷窃<br>每次经过起点刷新使用， 支付2000金币, 得到一名角色的技能",

        esther: "明亮之星<br>该角色将以25000金币和等级2起手 （请通知admin加给你）",

        abraham: "献祭羔羊<br>该角色起手拥有1只羔羊，每次经过起点+一只羔羊 （Max 3）， 每次受到罚款或地盘收购时可献祭一只羔羊无效",

        maxhine: "无灵魂 <br>该角色不会收到角色技能影响<br><br>枪林弹雨<br>该角色从战斗获得的金币两倍",

        deborah: "先知判断<br>该角色每次经过起点时，可自由改动技能卡的前5张顺序，然后可选择其中两张放入最下方",

        moses: "十大诫律<br>游戏中只能一次， 发动该技能后直到自己到起点前， 所有角色不能使用技能",

        armor: "改装<br>每次经过起点时， 抛一次骰子决定该武装直到下次经过起点，该角色不会从起点获得1000 <br>骰子1: 无改装<br>骰子2: 蓝骑<br>该角色在此改装下 一次不会受到负面影响 <br>骰子3: 红骑 <br>该角色在此改装下 一次战斗直接获得胜利，获得600 <br>骰子4: 紫骑<br> 该角色在此改装下 其他玩家踩中自己的地盘时，获得双倍金币 <br>骰子 5: 金骑<br>该角色获得3000金币 并且一次无效地盘收购 <br>骰子 6: 黑骑<br>该角色不会从耶稣身上获得金币，并且无法购买或升级地盘",




    };

    let ability = abilities[me];

    if(!ability){
        ability = "No ability";
    }

    document.getElementById("ability").innerHTML =
    `
    <hr>
    <h3>✨ 你的技能</h3>

    <div class="card">
    ${ability}
    </div>
    `;
}

function showMe() {

  let me = localStorage.getItem("myCharacter");

  let characterName = {
    zeus: "宙斯",
    hera: "赫拉",
    // 这里继续加你的角色
    // athena: "雅典娜",
    // hades: "哈迪斯"
  };

  let displayName = characterName[me] || me;

  document.getElementById("me").innerText =
    "你的角色是: " + me.toUpperCase() + " (" + displayName + ")";

  showAbility()

}
setInterval(showMe,1000);

</script>

</body>
</html>
