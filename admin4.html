<!DOCTYPE html>
<html>
<head>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="function2.js"></script>
  <script src="function1.js"></script>
  <meta charset="UTF-8">
  <title>Game Master Panel v2</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    h2, h3 {
      margin-top: 15px;
    }

    .card {
      background: #222;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
    }

    button, input, select {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      cursor: pointer;
    }

    .danger { background: red; color: white; }
    .good { background: green; color: white; }
    .warn { background: orange; color: white; }

    hr {
      margin: 15px 0;
      border: 1px solid #333;
    }

    #players {
      margin-bottom: 10px;
    }

    #orderList .card {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>

<body>

<h2>🎮 基督征战 </h2>

<!-- PLAYERS -->
<div id="players"></div>

<hr>

<!-- REMOVE PLAYER -->
<h3>🗑 移除玩家</h3>
<select id="removePlayer"></select>
<button class="danger" onclick="removePlayer()">移除玩家</button>

<hr>

<!-- GAME CONTROL -->
<h3>🟢 游戏控制l</h3>
<button class="good" onclick="startGame()">开始</button>
<button class="danger" onclick="resetGame()">重置</button>

<hr>

<!-- TURN SYSTEM -->
<h3>🔁 回合系统</h3>
<h3>📌 轮到: <span id="liveTurn">-</span></h3>
<button onclick="nextTurn()">下一位</button>

<hr>

<!-- SKIP -->
<h3>⛔ 跳过玩家</h3>
<select id="skipPlayer"></select>
<button onclick="skipTurn()">跳过一回合</button>

<hr>

<!-- TURN ORDER -->
<h3>🎯 玩家回合顺序</h3>
<div id="orderList"></div>
<button onclick="lockAndSave()">保存</button>

<hr>

<!-- MONEY -->
<h3>💰 金币更改</h3>

<select id="moneyPlayer"></select>
<input id="moneyAmount" placeholder="Amount">

<button class="good" onclick="addMoney()">+ 加</button>
<button class="danger" onclick="removeMoney()">- 减</button>

<hr>

<h3>⚡ Ability Control</h3>

<select id="abilityPlayer"></select>

<button onclick="refreshAbility()">刷新技能</button>
<button onclick="clearAbility()">清除技能</button>
<hr>

<!-- PENALTY -->
<h3>⚡ 惩罚系统</h3>
<select id="penaltyPlayer"></select>
<button class="danger" onclick="penalty()">惩罚 (-500)</button>

<hr>

    

<script>
let players = {};
let turnOrder = [];
let currentTurn = "";
let skipList = {};
let orderLocked=false;

listenPlayers((data) => {
  players = data;
  renderPlayers(players);
  updateSelect(players);
  loadAbilityPlayers();
});

listenTurnOrder((data) => {
  turnOrder = data;
  renderTurnOrder(turnOrder);
});

listenCurrentTurn((data) => {
  currentTurn = data;
  renderTurnUI(currentTurn);
});

listenSkipList((data) => {
  skipList = data;
});


/* =========================
   STORAGE CORE
========================= */


function resetGame() {
  db.ref().set({
    players: {},
    turnOrder: [],
    currentTurn: "",
    skipList: {}
  });
}




function renderPlayers() {
  let html = "<h3>📜 玩家</h3>";

  for (let char in players) {
    html += `
      <div class="card">
        <b>${char.toUpperCase()}</b><br>
        名字: ${players[char].name}<br>
        金币: ${players[char].gold || 0}
      </div>
    `;
  }

  document.getElementById("players").innerHTML = html;
}

/* =========================
   UPDATE DROPDOWNS
========================= */
function updateSelect() {
  function fill(id) {
    let sel = document.getElementById(id);
    if (!sel) return;

    let prev = sel.value;
    sel.innerHTML = "";

    Object.keys(players).forEach(char => {
      let opt = document.createElement("option");
      opt.value = char;
      opt.textContent = `${char} (${players[char].name})`;
      sel.appendChild(opt);
    });

    sel.value = prev;
  }

  fill("removePlayer");
  fill("moneyPlayer");
  fill("penaltyPlayer");
  fill("skipPlayer");
}


/* =========================
   TURN ORDER SYNC
========================= */
function syncTurnOrderWithPlayers(){

  if(orderLocked) return;


  let playerList = Object.keys(players);


  let newOrder = turnOrder.filter(p =>
    playerList.includes(p)
  );


  playerList.forEach(p=>{

    if(!newOrder.includes(p)){
      newOrder.push(p);
    }

  });


  db.ref("turnOrder").set(newOrder);

}

/* =========================
   TURN UI
========================= */
function renderTurnUI(){

 document.getElementById("liveTurn")
 .innerText = currentTurn || "-";

}

/* =========================
   NEXT TURN
========================= */
function nextTurn(){

  if(turnOrder.length === 0)
    return;
  let index = turnOrder.indexOf(currentTurn);
  if(index === -1)
    index = 0;
  let nextIndex =
  (index + 1) % turnOrder.length;
  let nextPlayer =
  turnOrder[nextIndex];
  // check skip
  let skipCount =
  skipList[nextPlayer] || 0;

  if(skipCount > 0){

    db.ref("skipList/" + nextPlayer)
    .set(skipCount - 1);
    let skipNext =
    (nextIndex + 1) % turnOrder.length;
    db.ref("currentTurn")
    .set(turnOrder[skipNext]);


    alert(nextPlayer + " skipped");

    return;

  }
  db.ref("currentTurn")
  .set(nextPlayer);
}


/* =========================
   SKIP TURN
========================= */
function skipTurn(){

  let p = document.getElementById("skipPlayer").value;


  if(!p){
    alert("Select player");
    return;
  }


  db.ref("skipList/" + p).once("value")
  .then((snap)=>{

    let count = snap.val() || 0;


    db.ref("skipList/" + p)
    .set(count + 1);


    alert(p + " will skip next turn");

  });

}


/* =========================
   TURN ORDER UI
========================= */
function renderTurnOrder() {
  let container = document.getElementById("orderList");
  if (!container) return;

  let html = "";

  turnOrder.forEach((p, i) => {
    html += `
      <div class="card">
        ${i + 1}. ${p}
        <button onclick="moveUp(${i})">⬆</button>
        <button onclick="moveDown(${i})">⬇</button>
      </div>
    `;
  });

  container.innerHTML = html;
}

/* =========================
   GAME CONTROL
========================= */
function startGame(){

 if(turnOrder.length===0){

   alert("No players");
   return;

 }


 db.ref("currentTurn")
 .set(turnOrder[0]);

}


/* =========================
   MASTER RENDER
========================= */
function renderAll() {
  renderPlayers();
  updateSelect();
  renderTurnOrder();   // ⭐ 关键
  renderTurnUI();
}

/* =========================
   SAFE STORAGE CORE (FIXED)
========================= */

function removePlayer() {

  let p = document.getElementById("removePlayer").value;

  if (!p) {
    alert("No player selected");
    return;
  }


  // 删除 Firebase 玩家资料
  db.ref("players/" + p).remove()
  .then(()=>{

    console.log(p + " removed from players");


    // 同时从 turnOrder 删除
    db.ref("turnOrder").once("value")
    .then((snap)=>{

      let order = snap.val() || [];

      order = order.filter(x => x !== p);


      db.ref("turnOrder").set(order);


    });


    // 删除 skip 状态
    db.ref("skipList/" + p).remove();


    alert(p + " removed");


  })
  .catch((error)=>{

    console.error("Remove error:", error);
  });

}




/* TURN ORDER */

function moveUp(index) {

  if (index === 0) return;

  let newOrder = [...turnOrder];

  [newOrder[index - 1], newOrder[index]] =
  [newOrder[index], newOrder[index - 1]];


  db.ref("turnOrder").set(newOrder);

}

function moveDown(index) {

  if (index === turnOrder.length - 1) return;


  let newOrder = [...turnOrder];


  [newOrder[index + 1], newOrder[index]] =
  [newOrder[index], newOrder[index + 1]];


  db.ref("turnOrder").set(newOrder);

}
function lockAndSave(){

  db.ref("orderLocked").set(true);


  alert("Turn order locked!");

}

function loadAbilityPlayers(){

  let select=document.getElementById("abilityPlayer");

  if(!select){
    return;
  }

  select.innerHTML="";

  Object.keys(players).forEach(char=>{

    select.innerHTML+=`
    <option value="${char}">
    ${char.toUpperCase()} (${players[char].name})
    </option>
    `;

  });

}

function refreshAbility(){

    let char=document.getElementById("abilityPlayer").value;

    let p=players[char];

    if(!p || !p.ability)return;


    let maxCharge=1;

    if(char=="hera"){
        maxCharge=3;
    }


    let charge=Math.min(
        (p.ability.charge||0)+1,
        maxCharge
    );


    db.ref("players/"+char+"/ability").update({

        charge:charge,

        maxCharge:maxCharge

    });

}

function clearAbility(){

let char=document.getElementById("abilityPlayer").value;

db.ref("players/"+char+"/ability").update({

charge:0,
active:false,
status:"normal"

});

alert(char+" 技能清除");

}

/* =========================
   INIT
========================= */
function boot() {
  syncTurnOrderWithPlayers();
  renderAll();
}

window.onload = boot;

setInterval(() => {
  syncTurnOrderWithPlayers();
  renderAll();
}, 800);
</script>

</body>
</html>
