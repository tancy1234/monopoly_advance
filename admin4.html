<!DOCTYPE html>
<html>
<head>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="function2.js"></script>
  <script src="function1.js"></script>
  <meta charset="UTF-8">
  <title>Game Master Panel v2</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    h2, h3 {
      margin-top: 15px;
    }

    .card {
      background: #222;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
    }

    button, input, select {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      cursor: pointer;
    }

    .danger { background: red; color: white; }
    .good { background: green; color: white; }
    .warn { background: orange; color: white; }

    hr {
      margin: 15px 0;
      border: 1px solid #333;
    }

    #players {
      margin-bottom: 10px;
    }

    #orderList .card {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>

<body>

<h2>🎮 Monopoly Game Master Panel v2</h2>

<!-- PLAYERS -->
<div id="players"></div>

<hr>

<!-- REMOVE PLAYER -->
<h3>🗑 Remove Player</h3>
<select id="removePlayer"></select>
<button class="danger" onclick="removePlayer()">REMOVE PLAYER</button>

<hr>

<!-- GAME CONTROL -->
<h3>🟢 Game Control</h3>
<button class="good" onclick="startGame()">START GAME</button>
<button class="danger" onclick="resetGame()">RESET GAME</button>

<hr>

<!-- TURN SYSTEM -->
<h3>🔁 Turn System</h3>
<h3>📌 Current Turn: <span id="liveTurn">-</span></h3>
<button onclick="nextTurn()">NEXT TURN</button>

<hr>

<!-- SKIP -->
<h3>⛔ Skip Next Turn</h3>
<select id="skipPlayer"></select>
<button onclick="skipTurn()">Skip 1 Round</button>

<hr>

<!-- TURN ORDER -->
<h3>🎯 Turn Order Setup</h3>
<div id="orderList"></div>
<button onclick="lockAndSave()">SAVE TURN ORDER</button>

<hr>

<!-- MONEY -->
<h3>💰 Edit Money</h3>

<select id="moneyPlayer"></select>
<input id="moneyAmount" placeholder="Amount">

<button class="good" onclick="addMoney()">+ ADD</button>
<button class="danger" onclick="removeMoney()">- REMOVE</button>

<hr>

<!-- PENALTY -->
<h3>⚡ Penalty System</h3>
<select id="penaltyPlayer"></select>
<button class="danger" onclick="penalty()">GIVE PENALTY (-500)</button>

<hr>

    

<script>
let players = {};
let turnOrder = [];
let currentTurn = "";
let skipList = {};

listenPlayers((data) => {
  players = data;
  renderPlayers(players);
  updateSelect(players);
});

listenTurnOrder((data) => {
  turnOrder = data;
  renderTurnOrder(turnOrder);
});

listenCurrentTurn((data) => {
  currentTurn = data;
  renderTurnUI(currentTurn);
});

listenSkipList((data) => {
  skipList = data;
});

/* =========================
   STORAGE CORE
========================= */


function resetGame() {
  db.ref().set({
    players: {},
    turnOrder: [],
    currentTurn: "",
    skipList: {}
  });
}




function renderPlayers() {
  let html = "<h3>📜 Players</h3>";

  for (let char in players) {
    html += `
      <div class="card">
        <b>${char.toUpperCase()}</b><br>
        Name: ${players[char].name}<br>
        Gold: ${players[char].gold || 0}
      </div>
    `;
  }

  document.getElementById("players").innerHTML = html;
}

/* =========================
   UPDATE DROPDOWNS
========================= */
function updateSelect() {
  function fill(id) {
    let sel = document.getElementById(id);
    if (!sel) return;

    let prev = sel.value;
    sel.innerHTML = "";

    Object.keys(players).forEach(char => {
      let opt = document.createElement("option");
      opt.value = char;
      opt.textContent = `${char} (${players[char].name})`;
      sel.appendChild(opt);
    });

    sel.value = prev;
  }

  fill("removePlayer");
  fill("moneyPlayer");
  fill("penaltyPlayer");
  fill("skipPlayer");
}


/* =========================
   TURN ORDER SYNC
========================= */
function syncTurnOrderWithPlayers() {

  let playerKeys = Object.keys(players);

  let order = turnOrder;


  order = order.filter(p => playerKeys.includes(p));


  playerKeys.forEach(p=>{

    if(!order.includes(p)){
      order.push(p);
    }

  });


  db.ref("turnOrder").set(order);

}

/* =========================
   TURN UI
========================= */
function renderTurnUI() {
  let current = getCurrentTurn() || "-";
  document.getElementById("liveTurn").innerText = current;
}

/* =========================
   NEXT TURN
========================= */
function nextTurn() {
  if (!turnOrder.length) return;

  let index = turnOrder.indexOf(currentTurn);
  if (index === -1) index = 0;

  let nextIndex = (index + 1) % turnOrder.length;
  let nextPlayer = turnOrder[nextIndex];

  db.ref("currentTurn").set(nextPlayer);
}


/* =========================
   SKIP TURN
========================= */
function skipTurn() {
  let p = document.getElementById("skipPlayer").value;

  let newSkip = skipList;
  newSkip[p] = (newSkip[p] || 0) + 1;

  db.ref("skipList").set(newSkip);
}


/* =========================
   TURN ORDER UI
========================= */
function renderTurnOrder() {
  let container = document.getElementById("orderList");
  if (!container) return;

  let html = "";

  turnOrder.forEach((p, i) => {
    html += `
      <div class="card">
        ${i + 1}. ${p}
        <button onclick="moveUp(${i})">⬆</button>
        <button onclick="moveDown(${i})">⬇</button>
      </div>
    `;
  });

  container.innerHTML = html;
}

/* =========================
   GAME CONTROL
========================= */
function startGame() {
  if (!turnOrder.length) {
    alert("No players");
    return;
  }

  db.ref("currentTurn").set(turnOrder[0]);
}


/* =========================
   MASTER RENDER
========================= */
function renderAll() {
  renderPlayers();
  updateSelect();
  renderTurnOrder();   // ⭐ 关键
  renderTurnUI();
}

/* =========================
   SAFE STORAGE CORE (FIXED)
========================= */

function removePlayer() {

  let p = document.getElementById("removePlayer").value;

  if (!p) {
    alert("No player selected");
    return;
  }


  // 删除 Firebase 玩家资料
  db.ref("players/" + p).remove()
  .then(()=>{

    console.log(p + " removed from players");


    // 同时从 turnOrder 删除
    db.ref("turnOrder").once("value")
    .then((snap)=>{

      let order = snap.val() || [];

      order = order.filter(x => x !== p);


      db.ref("turnOrder").set(order);


    });


    // 删除 skip 状态
    db.ref("skipList/" + p).remove();


    alert(p + " removed");


  })
  .catch((error)=>{

    console.error("Remove error:", error);
  });

}




/* TURN ORDER */









function moveUp(index) {
  if (index === 0) return;

  [turnOrder[index - 1], turnOrder[index]] =
  [turnOrder[index], turnOrder[index - 1]];

  db.ref("turnOrder").set(turnOrder);
}

function moveDown(index) {
  if (index === turnOrder.length - 1) return;

  [turnOrder[index + 1], turnOrder[index]] =
  [turnOrder[index], turnOrder[index + 1]];

  db.ref("turnOrder").set(turnOrder);
}


/* =========================
   INIT
========================= */
function boot() {
  syncTurnOrderWithPlayers();
  renderAll();
}

window.onload = boot;

setInterval(() => {
  syncTurnOrderWithPlayers();
  renderAll();
}, 800);
</script>

</body>
</html>
